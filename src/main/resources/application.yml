spring:
  application:
    name: ledgeflow

  datasource:
    url: jdbc:postgresql://localhost:5432/ledgeflow
    username: ledgeflow
    password: ledgeflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
